<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮質醇過高自我檢查表｜小艾Iris營養師</title>
<style>
  :root {
    --bg: #F2EEE6;
    --card: #FFFFFF;
    --card-border: #E7E1D5;
    --header-blue: #A9C7E8;
    --header-blue-text: #1E3A5F;
    --text-main: #2B2B28;
    --text-sub: #6B6558;
    --accent: #3E6FA8;
    --accent-soft: #EAF1FA;
    --level-1: #4C8C6B;
    --level-1-bg: #EAF5EE;
    --level-2: #7FA05C;
    --level-2-bg: #F0F5E7;
    --level-3: #B8A339;
    --level-3-bg: #F7F2DC;
    --level-4: #C58A2E;
    --level-4-bg: #FBF2E3;
    --level-5: #CC7A3C;
    --level-5-bg: #FCEFE4;
    --level-6: #C05B4A;
    --level-6-bg: #FBEAE7;
    --radius-lg: 20px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 48px 20px 80px;
    background: var(--bg);
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
    color: var(--text-main);
    display: flex;
    justify-content: center;
  }

  .page {
    width: 100%;
    max-width: 720px;
  }

  .header-badge {
    display: block;
    margin: 0 auto 20px;
    width: fit-content;
    background: var(--header-blue);
    color: var(--header-blue-text);
    font-weight: 700;
    font-size: 26px;
    padding: 14px 32px;
    border-radius: 14px;
    letter-spacing: 1px;
  }

  .subtitle {
    text-align: center;
    color: var(--text-sub);
    font-size: 16px;
    margin-bottom: 36px;
  }

  .item {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 22px 26px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 18px;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }

  .item:hover {
    border-color: var(--accent);
  }

  .item:active {
    transform: scale(0.997);
  }

  .item.checked {
    background: var(--accent-soft);
    border-color: var(--accent);
  }

  .checkbox {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    border: 2px solid #C9C2B2;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .item.checked .checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkbox svg {
    width: 16px;
    height: 16px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .item.checked .checkbox svg {
    opacity: 1;
  }

  .item-label {
    font-size: 17px;
    line-height: 1.5;
    font-weight: 500;
  }

  .counter-wrap {
    text-align: center;
    margin: 36px 0 18px;
    font-size: 17px;
    color: var(--text-sub);
  }

  .counter-num {
    font-size: 40px;
    font-weight: 800;
    color: var(--accent);
    margin: 0 8px;
    vertical-align: middle;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-lg);
    padding: 30px 30px;
    text-align: center;
    font-size: 16px;
    color: var(--text-sub);
    line-height: 1.8;
    transition: background 0.25s ease, border-color 0.25s ease;
  }

  .result-card.level-1 {
    background: var(--level-1-bg);
    border-color: var(--level-1);
  }
  .result-card.level-2 {
    background: var(--level-2-bg);
    border-color: var(--level-2);
  }
  .result-card.level-3 {
    background: var(--level-3-bg);
    border-color: var(--level-3);
  }
  .result-card.level-4 {
    background: var(--level-4-bg);
    border-color: var(--level-4);
  }
  .result-card.level-5 {
    background: var(--level-5-bg);
    border-color: var(--level-5);
  }
  .result-card.level-6 {
    background: var(--level-6-bg);
    border-color: var(--level-6);
  }

  .result-title {
    display: block;
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .level-1 .result-title { color: var(--level-1); }
  .level-2 .result-title { color: var(--level-2); }
  .level-3 .result-title { color: var(--level-3); }
  .level-4 .result-title { color: var(--level-4); }
  .level-5 .result-title { color: var(--level-5); }
  .level-6 .result-title { color: var(--level-6); }

  .result-body {
    color: var(--text-main);
  }

  .disclaimer {
    text-align: center;
    color: #A29C8C;
    font-size: 13px;
    line-height: 1.8;
    margin-top: 28px;
  }

  .reset-row {
    text-align: center;
    margin-top: 22px;
  }

  .reset-btn {
    background: none;
    border: 1px solid var(--card-border);
    color: var(--text-sub);
    font-size: 14px;
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s ease, color 0.15s ease;
  }

  .reset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .cta-card {
    background: var(--header-blue);
    border-radius: var(--radius-lg);
    padding: 30px 30px;
    text-align: center;
    margin-top: 32px;
  }

  .cta-text {
    color: var(--header-blue-text);
    font-size: 16px;
    line-height: 1.7;
    margin: 0 0 18px;
    font-weight: 500;
  }

  .cta-btn {
    display: inline-block;
    background: var(--header-blue-text);
    color: #FFFFFF;
    text-decoration: none;
    font-size: 15.5px;
    font-weight: 700;
    padding: 13px 32px;
    border-radius: 30px;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }

  .cta-btn:hover {
    opacity: 0.88;
  }

  .cta-btn:active {
    transform: scale(0.98);
  }

  @media (max-width: 480px) {
    body { padding: 32px 14px 60px; }
    .header-badge { font-size: 21px; padding: 12px 22px; }
    .item { padding: 18px 18px; gap: 14px; }
    .item-label { font-size: 15.5px; }
    .counter-num { font-size: 32px; }
    .cta-card { padding: 24px 20px; }
    .cta-text { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="page">

  <span class="header-badge">皮質醇過高自我檢查表</span>
  <p class="subtitle">是不是壓力荷爾蒙偏高了？勾勾看你中了幾項</p>

  <div id="checklist"></div>

  <div class="counter-wrap">
    你勾了 <span class="counter-num" id="counterNum">0</span> 項 / 12 項
  </div>

  <div class="result-card" id="resultCard">
    <span class="result-title" id="resultTitle"></span>
    <span class="result-body" id="resultBody">勾選項目後，這裡會顯示你的壓力狀態評估</span>
  </div>

  <div class="reset-row">
    <button class="reset-btn" id="resetBtn">重新勾選</button>
  </div>

  <div class="cta-card">
    <p class="cta-text">不知道該如何從飲食及生活習慣調整？<br>歡迎填表單預約諮詢！</p>
    <a class="cta-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSepZpKMrNzIeme2KpfslbE8d4vbA9b9iWBtLPH-Hsv-VHdtOQ/viewform?usp=header" target="_blank" rel="noopener noreferrer">預約諮詢</a>
  </div>

  <p class="disclaimer">
    此表僅供自我覺察參考，無法取代醫療診斷。<br>
    若症狀持續或明顯，建議就醫檢測血液/唾液皮質醇。
  </p>

</div>

<script>
  const items = [
    "晚上難入睡，或睡了還是覺得沒睡飽",
    "沒吃很多，體脂卻卡關甚至上升",
    "特別想吃甜食、澱粉，尤其到晚上",
    "空腹容易心悸、手抖、頭暈",
    "情緒容易緊繃、焦慮，難以放鬆",
    "下午特別累，晚上卻很清醒",
    "訓練後恢復變慢，痠痛拖很久",
    "月經週期不規律或亂經",
    "皮膚變差，容易長痘或水腫",
    "記憶力、專注力明顯下降",
    "體重集中堆積在腹部",
    "免疫力變差，容易感冒或過敏"
  ];

  const checklistEl = document.getElementById('checklist');
  const counterNumEl = document.getElementById('counterNum');
  const resultCardEl = document.getElementById('resultCard');
  const resultTitleEl = document.getElementById('resultTitle');
  const resultBodyEl = document.getElementById('resultBody');
  const resetBtn = document.getElementById('resetBtn');

  const checkState = new Array(items.length).fill(false);

  function buildChecklist() {
    items.forEach((label, i) => {
      const row = document.createElement('div');
      row.className = 'item';
      row.setAttribute('data-index', i);
      row.innerHTML = `
        <span class="checkbox">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </span>
        <span class="item-label">${label}</span>
      `;
      row.addEventListener('click', () => toggle(i, row));
      checklistEl.appendChild(row);
    });
  }

  function toggle(i, row) {
    checkState[i] = !checkState[i];
    row.classList.toggle('checked', checkState[i]);
    updateResult();
  }

  function updateResult() {
    const count = checkState.filter(Boolean).length;
    counterNumEl.textContent = count;

    resultCardEl.classList.remove('level-1', 'level-2', 'level-3', 'level-4', 'level-5', 'level-6');

    if (count === 0) {
      resultTitleEl.textContent = '';
      resultBodyEl.textContent = '勾選項目後，這裡會顯示你的壓力狀態評估';
      return;
    }

    if (count <= 2) {
      resultCardEl.classList.add('level-1');
      resultTitleEl.textContent = '壓力狀態穩定';
      resultBodyEl.textContent = '目前幾乎沒有出現皮質醇偏高的徵兆，作息與壓力調節都算穩定。持續維持規律三餐、足量蛋白質與優質油脂，是最好的保養方式。';
    } else if (count <= 4) {
      resultCardEl.classList.add('level-2');
      resultTitleEl.textContent = '輕度壓力訊號';
      resultBodyEl.textContent = '出現了幾項壓力荷爾蒙偏高的徵兆，可能是近期作息或壓力稍微增加。這階段建議穩定血糖為優先：避免空腹太久、減少精緻糖攝取，三餐搭配足夠蛋白質與纖維，能幫助情緒與食慾更穩定。';
    } else if (count <= 6) {
      resultCardEl.classList.add('level-3');
      resultTitleEl.textContent = '中度壓力累積，建議留意調整';
      resultBodyEl.textContent = '符合的項目已經來到一半左右，睡眠與飲食渴望開始受到影響。建議固定進食時間、每天攝取足夠蛋白質與蔬菜，並可增加富含鎂的食物（如深綠色蔬菜、堅果），同時觀察睡眠品質是否需要優先處理。';
    } else if (count <= 8) {
      resultCardEl.classList.add('level-4');
      resultTitleEl.textContent = '中度壓力負荷，建議開始調整';
      resultBodyEl.textContent = '符合項目偏多，身體的內分泌與代謝節奏可能已受影響。飲食上避免長時間空腹或極端限制熱量，並補充 B 群、鎂、Omega-3 等有助神經系統穩定的營養素。睡眠與壓力管理需要同步處理。';
    } else if (count <= 10) {
      resultCardEl.classList.add('level-5');
      resultTitleEl.textContent = '壓力負荷偏高，建議積極介入';
      resultBodyEl.textContent = '大部分項目都符合，身體可能已處於長期壓力狀態，代謝與內分泌都可能受影響。這階段不建議再用低熱量或高強度飲食控制壓迫身體，反而要確保足夠熱量與規律進食，減少額外壓力來源，並考慮尋求專業協助。';
    } else {
      resultCardEl.classList.add('level-6');
      resultTitleEl.textContent = '壓力負荷非常高，建議就醫評估';
      resultBodyEl.textContent = '幾乎所有項目都符合，這是身體發出的明確警訊。強烈建議先暫緩積極的體態控制計畫，把重心放在恢復與醫療評估上，並檢測血液或唾液皮質醇，釐清實際狀況，不要獨自硬撐。';
    }
  }

  resetBtn.addEventListener('click', () => {
    checkState.fill(false);
    document.querySelectorAll('.item').forEach(el => el.classList.remove('checked'));
    updateResult();
  });

  buildChecklist();
</script>

</body>
</html>
